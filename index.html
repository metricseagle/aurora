<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Aurora</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000008; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="fsBtn" onclick="goFull()" style="
  position:fixed;bottom:20px;right:20px;z-index:999;
  background:rgba(255,255,255,0.15);color:#fff;
  border:1px solid rgba(255,255,255,0.3);border-radius:8px;
  padding:12px 18px;font-size:18px;cursor:pointer;">⛶ Fullscreen</button>
<script>
function goFull() {
  var el = document.documentElement;
  if      (el.requestFullscreen)       el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
  else if (el.msRequestFullscreen)     el.msRequestFullscreen();
  document.getElementById('fsBtn').style.display='none';
}

// ── Keep screen awake ─────────────────────────────────────────────────────────
// Method 1: WakeLock API (modern browsers)
function requestWakeLock() {
  if (navigator.wakeLock) {
    navigator.wakeLock.request('screen').catch(function(){});
  }
}
requestWakeLock();
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') requestWakeLock();
});

// Method 2: tiny silent looping video — tricks iOS into keeping screen on
(function() {
  var v = document.createElement('video');
  v.setAttribute('loop', '');
  v.setAttribute('playsinline', '');
  v.setAttribute('webkit-playsinline', '');
  v.muted = true;
  v.volume = 0;
  v.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0.01;top:0;left:0;pointer-events:none;z-index:-1;';
  // Minimal valid MP4: 1x1 px, 1 frame, silent
  v.src = 'data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28ybXA0MQAAAAhmcmVlAAAAGm1kYXQAAAGzABAHAAABthADAowdbb9/AAAC6W1vb3YAAABsbXZoZAAAAAAAAAAAAAAAAAAAA+gAAAAAAAEAAAEAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAIAAAIVdHJhawAAAFx0a2hkAAAAAwAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAABAAAAAAWAAAAFgAAAAAAAkZWR0cwAAABxlbHN0AAAAAAAAAAEAAAAAAAAAAAAQAAAAAAAABrRtZGlhAAAAIG1kaGQAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAVcQAAAAAAC1oZGxyAAAAAAAAAAB2aWRlAAAAAAAAAAAAAAAAVmlkZW9IYW5kbGVyAAAABl9taW5mAAAAFHZtaGQAAAABAAAAAAAAAAAAAAAkZGluZgAAABxkcmVmAAAAAAAAAAEAAAAMdXJsIAAAAAEAAAYfc3RibAAAAK9zdHNkAAAAAAAAAAEAAACfc3R0cwAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAMHN0dHMAAAAAAAAAAQAAABAAAAAAAAAAMHN0c2MAAAAAAAAAAQAAAAEAAAAQAAAAAQAAAFBzdHN6AAAAAAAAAAAAAAAQAAAAMAAAACgAAAAoAAAAKAAAACgAAAAoAAAAKAAAACgAAAAoAAAAKAAAACgAAAAoAAAAKAAAACgAAAAoAAAADHN0Y28AAAAAAAAAAQAAADAAAABidWR0YQAAAFptZXRhAAAAAAAAACFoZGxyAAAAAAAAAABtZGlyYXBwbAAAAAAAAAAAAAAAAC1pbHN0AAAAJal0b28AAAAdZGF0YQAAAAEAAAAATGF2ZjU4LjQ1LjEwMA==';
  document.body.appendChild(v);
  function tryPlay() { v.play().catch(function(){}); }
  tryPlay();
  document.addEventListener('touchstart', tryPlay, { once: true });
})();
</script>
<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H, T = 0, startTime = null, lastNow = null;

// ── Resize ────────────────────────────────────────────────────────────────────
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildLand();
  initStars();
}
window.addEventListener('resize', resize);

// ── Stars — fixed, no twinkle, drawn as one big batch ────────────────────────
// Pre-built into an offscreen canvas so main loop just does one drawImage
var starCanvas = document.createElement('canvas');
var starCtx    = starCanvas.getContext('2d');
function initStars() {
  starCanvas.width  = W;
  starCanvas.height = H;
  starCtx.clearRect(0, 0, W, H);
  var n = Math.floor(W * H / 1200);
  for (var i = 0; i < n; i++) {
    var x = Math.random() * W;
    var y = Math.random() * H * 0.80;
    var r = Math.random() < 0.08 ? (0.9 + Math.random() * 1.2) : (0.2 + Math.random() * 0.5);
    var a = 0.3 + Math.random() * 0.7;
    starCtx.beginPath();
    starCtx.arc(x, y, r, 0, 6.28);
    starCtx.fillStyle = 'rgba(255,255,255,' + a + ')';
    starCtx.fill();
  }
}

// ── Aurora — 3 bands, 4 control points, NO screen blend ──────────────────────
// Colors chosen to look vivid without needing screen compositing
var BANDS = [
  { base:0.22, hue:155, amp:0.11, sp:0.16, wsp:0.20, th:0.22, br:0.55 },
  { base:0.30, hue:200, amp:0.09, sp:0.12, wsp:0.16, th:0.19, br:0.45 },
  { base:0.17, hue:265, amp:0.10, sp:0.19, wsp:0.22, th:0.17, br:0.40 },
];
var COLS = 5;
var bpts = BANDS.map(function() {
  var a = [];
  for (var i = 0; i < COLS; i++) a.push({ ph: Math.random()*6.28, ph2: Math.random()*6.28 });
  return a;
});

function drawAuroraBand(band, bi) {
  var P     = bpts[bi];
  var yBase = band.base*H + Math.sin(T*band.sp)*band.amp*H;
  var thick = band.th*H*(0.85 + 0.15*Math.sin(T*band.wsp+bi));
  var hue   = band.hue + Math.sin(T*band.sp*0.6+bi)*20;

  var topX=[], topY=[], botY=[];
  for (var i=0; i<COLS; i++) {
    var p = P[i];
    topX.push(i/(COLS-1)*W);
    topY.push(yBase
      + Math.sin(T*band.wsp       + p.ph       )*thick*0.50
      + Math.sin(T*band.wsp*0.45  + p.ph2+i*1.2)*thick*0.22);
    botY.push(topY[i] + thick
      + Math.sin(T*band.wsp*0.55 + p.ph+2)*thick*0.15);
  }

  ctx.beginPath();
  ctx.moveTo(topX[0], topY[0]);
  for (var i=1; i<COLS-1; i++) {
    ctx.quadraticCurveTo(topX[i],topY[i],
      (topX[i]+topX[i+1])/2,(topY[i]+topY[i+1])/2);
  }
  ctx.lineTo(topX[COLS-1], topY[COLS-1]);
  for (var i=COLS-1; i>0; i--) {
    ctx.quadraticCurveTo(topX[i],botY[i],
      (topX[i-1]+topX[i])/2,(botY[i-1]+botY[i])/2);
  }
  ctx.closePath();

  // Single linear gradient — no screen blend needed, just higher alpha
  var gy = ctx.createLinearGradient(0, yBase-thick*0.1, 0, yBase+thick*1.2);
  gy.addColorStop(0,   'hsla('+hue+',90%,60%,0)');
  gy.addColorStop(0.25,'hsla('+hue+',88%,58%,'+(band.br*0.7)+')');
  gy.addColorStop(0.55,'hsla('+hue+',86%,55%,'+band.br+')');
  gy.addColorStop(0.80,'hsla('+hue+',84%,50%,'+(band.br*0.6)+')');
  gy.addColorStop(1,   'hsla('+hue+',80%,40%,0)');
  ctx.fillStyle = gy;
  ctx.fill();
}

// ── Particles — very few, simple movement ────────────────────────────────────
var particles = [];
function initParticles() {
  particles = [];
  var n = Math.min(12, Math.floor(W * H / 12000));
  for (var i=0; i<n; i++) {
    var p = mkP();
    p.life = Math.random() * p.maxLife;
    particles.push(p);
  }
}
function mkP() {
  var hues = [155, 195, 265];
  return {
    x: Math.random()*W, y: H*0.15 + Math.random()*H*0.5,
    vx: (-0.2+Math.random()*0.4)*28,
    vy: (-0.5-Math.random()*0.4)*28,
    r: 1.0+Math.random()*1.8,
    a: 0.3+Math.random()*0.4,
    hue: hues[Math.floor(Math.random()*hues.length)],
    life:0, maxLife: 7+Math.random()*9,
    wob: Math.random()*6.28, ws: 0.8+Math.random()*2.0,
  };
}

// ── Shooting stars — infrequent ───────────────────────────────────────────────
var meteors = [], nextMeteorAt = 5+Math.random()*10;
function mkMeteor() {
  return {
    x: W*0.15+Math.random()*W*0.7, y: -30+Math.random()*H*0.06,
    vx: (-4-Math.random()*5)*28, vy: (4+Math.random()*7)*28,
    len: 90+Math.random()*140, a: 0.7+Math.random()*0.3,
    hue: 190+Math.random()*100, w: 1.5+Math.random()*1.2,
    dur: 1.0+Math.random()*0.8, age:0,
  };
}

// ── Landscape offscreen ───────────────────────────────────────────────────────
var landCanvas = document.createElement('canvas');
var landCtx    = landCanvas.getContext('2d');
function buildLand() {
  landCanvas.width = W; landCanvas.height = H;
  var lc = landCtx;
  lc.clearRect(0,0,W,H);
  var MH = H*0.18;
  var peaks = [
    [0,H],[W*.05,H-MH*.52],[W*.13,H-MH*.88],
    [W*.22,H-MH*.48],[W*.31,H-MH*.97],
    [W*.40,H-MH*.60],[W*.48,H-MH*1.0],
    [W*.56,H-MH*.63],[W*.63,H-MH*.86],
    [W*.71,H-MH*.50],[W*.78,H-MH*.79],
    [W*.85,H-MH*.44],[W*.92,H-MH*.81],
    [W*.97,H-MH*.54],[W,H],
  ];
  lc.beginPath();
  lc.moveTo(peaks[0][0],peaks[0][1]);
  for (var i=1;i<peaks.length-1;i++) {
    lc.quadraticCurveTo(peaks[i][0],peaks[i][1],
      (peaks[i][0]+peaks[i+1][0])/2,(peaks[i][1]+peaks[i+1][1])/2);
  }
  lc.lineTo(W,H); lc.lineTo(0,H); lc.closePath();
  var mg=lc.createLinearGradient(0,H-MH,0,H);
  mg.addColorStop(0,'#0c0e18'); mg.addColorStop(1,'#050609');
  lc.fillStyle=mg; lc.fill();

  var tBaseY=H-MH*0.36;
  lc.beginPath(); lc.moveTo(0,tBaseY+12);
  var tc=Math.floor(W/10);
  for (var i=0;i<=tc;i++) {
    var x=i/tc*W;
    var by=tBaseY+(-8+Math.random()*16)+Math.sin(x*.025)*H*.01;
    var th=H*.03+Math.random()*H*.05;
    var tw=5+Math.random()*9;
    lc.lineTo(x-tw*.5,by); lc.lineTo(x,by-th); lc.lineTo(x+tw*.5,by);
  }
  lc.lineTo(W,tBaseY+12); lc.lineTo(W,H); lc.lineTo(0,H); lc.closePath();
  lc.fillStyle='#02030a'; lc.fill();
}

// ── Sky — redrawn only every 2s to save fill cost ────────────────────────────
var skyCanvas = document.createElement('canvas');
var skyCtx    = skyCanvas.getContext('2d');
var lastSkyT  = -99;
function buildSky() {
  skyCanvas.width = W; skyCanvas.height = H;
  lastSkyT = T;
  var pulse = 0.5+0.5*Math.sin(T*0.3);
  var g = skyCtx.createRadialGradient(W*.5,H*.25,0,W*.5,H*.5,Math.max(W,H)*.9);
  g.addColorStop(0,  'hsla(220,60%,'+(5+2*pulse)+'%,1)');
  g.addColorStop(.5, 'hsla(230,70%,'+(3+pulse)+'%,1)');
  g.addColorStop(1,  'hsla(240,80%,2%,1)');
  skyCtx.fillStyle = g;
  skyCtx.fillRect(0,0,W,H);
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop(now) {
  requestAnimationFrame(loop);
  if (startTime === null) { startTime = now; lastNow = now; buildSky(); }
  var dt = Math.min((now-lastNow)/1000, 0.1);
  lastNow = now;
  T = (now-startTime)/1000;

  // Sky — cheap drawImage, rebuild only every 2s
  if (T - lastSkyT > 2) buildSky();
  ctx.drawImage(skyCanvas, 0, 0);

  // Stars — static image, one call
  ctx.drawImage(starCanvas, 0, 0);

  // Aurora — 3 bands, no screen blend
  for (var bi=0; bi<BANDS.length; bi++) drawAuroraBand(BANDS[bi], bi);

  // Particles
  for (var i=particles.length-1; i>=0; i--) {
    var p=particles[i]; p.life+=dt;
    if (p.life>p.maxLife||p.y<-10) { particles[i]=mkP(); continue; }
    p.wob+=p.ws*dt; p.x+=(p.vx+Math.sin(p.wob)*20)*dt; p.y+=p.vy*dt;
    var lr=p.life/p.maxLife;
    var fade=lr<0.12?lr/0.12:lr>0.75?(1-lr)/0.25:1;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28);
    ctx.fillStyle='hsla('+p.hue+',75%,70%,'+(p.a*fade)+')';
    ctx.fill();
  }

  // Shooting stars
  if (T>=nextMeteorAt) { meteors.push(mkMeteor()); nextMeteorAt=T+5+Math.random()*12; }
  for (var i=meteors.length-1; i>=0; i--) {
    var m=meteors[i]; m.age+=dt; m.x+=m.vx*dt; m.y+=m.vy*dt;
    if (m.age>m.dur||m.y>H+60||m.x<-150) { meteors.splice(i,1); continue; }
    var fade=Math.max(0,1-m.age/m.dur);
    var spd=Math.sqrt(m.vx*m.vx+m.vy*m.vy);
    var tx=m.x-m.vx/spd*m.len, ty=m.y-m.vy/spd*m.len;
    var mg2=ctx.createLinearGradient(tx,ty,m.x,m.y);
    mg2.addColorStop(0,'hsla('+m.hue+',80%,90%,0)');
    mg2.addColorStop(.7,'hsla('+m.hue+',80%,88%,'+(m.a*fade*.4)+')');
    mg2.addColorStop(1,'hsla('+m.hue+',90%,100%,'+(m.a*fade)+')');
    ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(m.x,m.y);
    ctx.strokeStyle=mg2; ctx.lineWidth=m.w; ctx.lineCap='round'; ctx.stroke();
  }

  // Landscape
  ctx.drawImage(landCanvas, 0, 0);
}

resize();
initParticles();
requestAnimationFrame(loop);
</script>
</body>
</html>
