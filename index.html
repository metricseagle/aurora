<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Aurora</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000008; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
var canvas = document.getElementById('c');
var ctx    = canvas.getContext('2d');
var W, H, t = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildLand();
}
window.addEventListener('resize', resize);

// ── Stars ─────────────────────────────────────────────────────────────────────
var stars = [];
function initStars() {
  stars = [];
  var n = Math.floor(W * H / 900);
  for (var i = 0; i < n; i++) {
    stars.push({
      x:  Math.random() * W,
      y:  Math.random() * H * 0.82,
      r:  Math.random() < 0.1 ? (0.8 + Math.random() * 1.4) : (0.2 + Math.random() * 0.6),
      a:  0.3 + Math.random() * 0.7,
      sp: 0.005 + Math.random() * 0.02,
      ph: Math.random() * 6.28,
    });
  }
}

// ── Aurora bands ──────────────────────────────────────────────────────────────
var BANDS = [
  { base: 0.22, hue: 155, amp: 0.11, sp: 0.00018, wsp: 0.00022, th: 0.20, br: 0.28 },
  { base: 0.30, hue: 200, amp: 0.09, sp: 0.00014, wsp: 0.00018, th: 0.18, br: 0.24 },
  { base: 0.18, hue: 265, amp: 0.12, sp: 0.00020, wsp: 0.00024, th: 0.17, br: 0.22 },
  { base: 0.38, hue: 145, amp: 0.08, sp: 0.00016, wsp: 0.00019, th: 0.15, br: 0.20 },
  { base: 0.14, hue: 345, amp: 0.07, sp: 0.00022, wsp: 0.00026, th: 0.14, br: 0.17 },
];
var COLS = 6;
var bpts = BANDS.map(function() {
  var arr = [];
  for (var i = 0; i < COLS; i++) arr.push({ ph: Math.random()*6.28, ph2: Math.random()*6.28 });
  return arr;
});

// ── Particles ─────────────────────────────────────────────────────────────────
var particles = [];
function initParticles() {
  particles = [];
  var n = Math.floor(W * H / 8000);
  for (var i = 0; i < n; i++) particles.push(mkP());
}
function mkP() {
  var hues = [155, 195, 265, 340, 45];
  return {
    x: Math.random() * W,
    y: H * 0.1 + Math.random() * H * 0.55,
    vx: -0.3 + Math.random() * 0.6,
    vy: -0.7 - Math.random() * 0.5,
    r: 0.8 + Math.random() * 2.0,
    a: 0.2 + Math.random() * 0.5,
    hue: hues[Math.floor(Math.random() * hues.length)],
    life: 0,
    maxLife: 200 + Math.random() * 350,
    wob: Math.random() * 6.28,
    ws: 0.01 + Math.random() * 0.025,
  };
}

// ── Shooting stars ────────────────────────────────────────────────────────────
var meteors = [], nextMeteor = 150 + Math.random() * 250;
function mkMeteor() {
  return {
    x: W * 0.1 + Math.random() * W * 0.8,
    y: -40 + Math.random() * H * 0.08,
    vx: -4 - Math.random() * 6,
    vy:  5 + Math.random() * 9,
    len: 80 + Math.random() * 160,
    a:   0.6 + Math.random() * 0.4,
    hue: 180 + Math.random() * 120,
    w:   1.5 + Math.random() * 1.5,
    life: 0,
  };
}

// ── Landscape — drawn once to offscreen canvas ────────────────────────────────
var landCanvas = document.createElement('canvas');
var landCtx    = landCanvas.getContext('2d');
function buildLand() {
  landCanvas.width  = W;
  landCanvas.height = H;
  var lc = landCtx;
  lc.clearRect(0, 0, W, H);
  var MH = H * 0.18;
  var peaks = [
    [0,H],[W*0.05,H-MH*0.52],[W*0.13,H-MH*0.88],
    [W*0.22,H-MH*0.48],[W*0.31,H-MH*0.97],
    [W*0.40,H-MH*0.60],[W*0.48,H-MH*1.00],
    [W*0.56,H-MH*0.63],[W*0.63,H-MH*0.86],
    [W*0.71,H-MH*0.50],[W*0.78,H-MH*0.79],
    [W*0.85,H-MH*0.44],[W*0.92,H-MH*0.81],
    [W*0.97,H-MH*0.54],[W,H],
  ];
  lc.beginPath();
  lc.moveTo(peaks[0][0], peaks[0][1]);
  for (var i = 1; i < peaks.length - 1; i++) {
    lc.quadraticCurveTo(peaks[i][0], peaks[i][1],
      (peaks[i][0]+peaks[i+1][0])/2, (peaks[i][1]+peaks[i+1][1])/2);
  }
  lc.lineTo(W,H); lc.lineTo(0,H); lc.closePath();
  var mg = lc.createLinearGradient(0, H-MH, 0, H);
  mg.addColorStop(0,'#0c0e18'); mg.addColorStop(1,'#050609');
  lc.fillStyle = mg; lc.fill();

  // Treeline
  var tBaseY = H - MH * 0.36;
  lc.beginPath();
  lc.moveTo(0, tBaseY + 12);
  var tc = Math.floor(W / 10);
  for (var i = 0; i <= tc; i++) {
    var x  = i / tc * W;
    var by = tBaseY + (-8 + Math.random()*16) + Math.sin(x*0.025)*H*0.01;
    var th = H*0.03 + Math.random()*H*0.05;
    var tw = 5 + Math.random()*9;
    lc.lineTo(x-tw*0.5, by);
    lc.lineTo(x, by-th);
    lc.lineTo(x+tw*0.5, by);
  }
  lc.lineTo(W, tBaseY+12);
  lc.lineTo(W,H); lc.lineTo(0,H); lc.closePath();
  lc.fillStyle = '#02030a'; lc.fill();
}

// ── Main loop — throttled to 30fps ────────────────────────────────────────────
var lastFrame = 0;
var FRAME_MS  = 34;

function drawAuroraBand(band, bi) {
  var P     = bpts[bi];
  var yBase = band.base*H + Math.sin(t*band.sp*1000)*band.amp*H;
  var thick = band.th*H*(0.85 + 0.15*Math.sin(t*band.wsp*900+bi));
  var hue   = band.hue + Math.sin(t*band.sp*700+bi)*18;
  var topX=[], topY=[], botY=[];
  for (var i=0;i<COLS;i++) {
    var p=P[i];
    topX.push(i/(COLS-1)*W);
    topY.push(yBase
      +Math.sin(t*band.wsp*800+p.ph)*thick*0.5
      +Math.sin(t*band.wsp*400+p.ph2+i*1.2)*thick*0.25);
    botY.push(topY[i]+thick+Math.sin(t*band.wsp*500+p.ph+2)*thick*0.18);
  }
  ctx.beginPath();
  ctx.moveTo(topX[0],topY[0]);
  for (var i=1;i<COLS-1;i++) {
    ctx.quadraticCurveTo(topX[i],topY[i],(topX[i]+topX[i+1])/2,(topY[i]+topY[i+1])/2);
  }
  ctx.lineTo(topX[COLS-1],topY[COLS-1]);
  for (var i=COLS-1;i>0;i--) {
    ctx.quadraticCurveTo(topX[i],botY[i],(topX[i-1]+topX[i])/2,(botY[i-1]+botY[i])/2);
  }
  ctx.closePath();
  var gy=ctx.createLinearGradient(0,yBase-thick*0.2,0,yBase+thick*1.3);
  gy.addColorStop(0,   'hsla('+hue+',92%,72%,0)');
  gy.addColorStop(0.2, 'hsla('+hue+',90%,68%,'+(band.br*0.6)+')');
  gy.addColorStop(0.5, 'hsla('+hue+',88%,63%,'+band.br+')');
  gy.addColorStop(0.8, 'hsla('+hue+',85%,58%,'+(band.br*0.6)+')');
  gy.addColorStop(1,   'hsla('+hue+',80%,48%,0)');
  ctx.fillStyle=gy; ctx.fill();
}

function loop(now) {
  requestAnimationFrame(loop);
  if (now - lastFrame < FRAME_MS) return;
  lastFrame = now;
  t++;

  // Sky
  var pulse = 0.5 + 0.5*Math.sin(t*0.003);
  var bg = ctx.createRadialGradient(W*0.5,H*0.3,0,W*0.5,H*0.5,Math.max(W,H)*0.9);
  bg.addColorStop(0,   'hsla(220,60%,'+(5+2*pulse)+'%,1)');
  bg.addColorStop(0.5, 'hsla(230,70%,'+(3+pulse)+'%,1)');
  bg.addColorStop(1,   'hsla(240,80%,2%,1)');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Stars
  for (var i=0;i<stars.length;i++) {
    var s=stars[i];
    var tw=0.35+0.65*Math.sin(t*s.sp*5+s.ph);
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,6.28);
    ctx.fillStyle='rgba(255,255,255,'+(s.a*tw)+')'; ctx.fill();
  }

  // Aurora
  ctx.globalCompositeOperation='screen';
  for (var bi=0;bi<BANDS.length;bi++) drawAuroraBand(BANDS[bi],bi);

  // Particles
  for (var i=particles.length-1;i>=0;i--) {
    var p=particles[i]; p.life++;
    if (p.life>p.maxLife||p.y<-10) { particles[i]=mkP(); continue; }
    p.wob+=p.ws; p.x+=p.vx+Math.sin(p.wob)*0.25; p.y+=p.vy;
    var lr=p.life/p.maxLife;
    var fade=lr<0.12?lr/0.12:lr>0.75?(1-lr)/0.25:1;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28);
    ctx.fillStyle='hsla('+p.hue+',75%,72%,'+(p.a*fade)+')'; ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';

  // Shooting stars
  if (t>=nextMeteor) {
    meteors.push(mkMeteor());
    nextMeteor=t+100+Math.random()*300;
  }
  ctx.globalCompositeOperation='screen';
  for (var i=meteors.length-1;i>=0;i--) {
    var m=meteors[i]; m.x+=m.vx; m.y+=m.vy; m.life++;
    if (m.y>H+60||m.x<-150) { meteors.splice(i,1); continue; }
    var fade=Math.max(0,1-m.life/45);
    var spd=Math.sqrt(m.vx*m.vx+m.vy*m.vy);
    var tx=m.x-m.vx/spd*m.len, ty=m.y-m.vy/spd*m.len;
    var mg2=ctx.createLinearGradient(tx,ty,m.x,m.y);
    mg2.addColorStop(0,'hsla('+m.hue+',80%,90%,0)');
    mg2.addColorStop(0.7,'hsla('+m.hue+',80%,88%,'+(m.a*fade*0.4)+')');
    mg2.addColorStop(1,'hsla('+m.hue+',90%,100%,'+(m.a*fade)+')');
    ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(m.x,m.y);
    ctx.strokeStyle=mg2; ctx.lineWidth=m.w; ctx.lineCap='round'; ctx.stroke();
  }
  ctx.globalCompositeOperation='source-over';

  // Landscape (single drawImage — very cheap)
  ctx.drawImage(landCanvas,0,0);
}

resize();
initStars();
initParticles();
requestAnimationFrame(loop);
</script>
</body>
</html>
